# Alembic configuration — minimal. We override the sqlalchemy.url at runtime
# from lemon_squeeze.config.settings so that the DB path follows LEMON_DB_PATH.
[alembic]
script_location = alembic
prepend_sys_path = .
# The actual URL is set programmatically in alembic/env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
